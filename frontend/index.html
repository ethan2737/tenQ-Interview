<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TenQ Interview</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__header">
          <p class="eyebrow">TenQ Interview</p>
          <h1>晨间复习台</h1>
          <p class="sidebar__copy">
            导入 Markdown 后，左侧保留原始目录顺序，右侧直接进入题卡阅读。
          </p>
        </div>

        <div class="sidebar__status" id="sidebar-status">尚未导入资料</div>
        <nav class="sidebar__list" id="document-list" aria-label="文档列表"></nav>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div class="toolbar__group">
            <button
              id="sidebar-toggle-button"
              class="toolbar__button toolbar__button--ghost toolbar__button--sidebar hidden"
              aria-expanded="false"
              aria-controls="document-list"
              type="button"
            >
              文档目录
            </button>
            <button id="import-file-button" class="toolbar__button toolbar__button--primary">
              导入文件
            </button>
            <button id="import-directory-button" class="toolbar__button">
              导入文件夹
            </button>
          </div>
          <div class="toolbar__meta" id="toolbar-meta">支持 Markdown，保持原始目录结构</div>
        </header>

        <section class="panel panel--hero" id="hero-panel">
          <p class="eyebrow">Quiet Editorial Utility</p>
          <h2>开始今天的面试复习</h2>
          <p>
            先导入单个 Markdown 或整组目录。系统会完成编码归一化、Markdown 解析、
            原文片段抽取、题卡生成和本地缓存。
          </p>
          <div class="hero__actions">
            <button id="hero-import-file" class="toolbar__button toolbar__button--primary">
              导入文档
            </button>
            <button id="hero-import-directory" class="toolbar__button">
              导入文件夹
            </button>
          </div>
        </section>

        <section class="panel panel--summary hidden" id="summary-panel" aria-live="polite">
          <div class="summary__header">
            <div>
              <p class="eyebrow">导入概览</p>
              <h2 id="summary-title">导入预览</h2>
            </div>
            <p class="summary__target" id="summary-target"></p>
          </div>
          <p class="summary__hint hidden" id="summary-hint"></p>
          <div class="summary__stats">
            <article class="stat">
              <span class="stat__label">总数</span>
              <strong class="stat__value" id="stat-total">0</strong>
            </article>
            <article class="stat">
              <span class="stat__label">可用</span>
              <strong class="stat__value" id="stat-ready">0</strong>
            </article>
            <article class="stat">
              <span class="stat__label">失败</span>
              <strong class="stat__value" id="stat-failed">0</strong>
            </article>
          </div>
          <div class="summary__actions">
            <button id="confirm-import-button" class="toolbar__button toolbar__button--primary">
              开始导入
            </button>
            <button id="cancel-import-button" class="toolbar__button">取消</button>
          </div>
        </section>

        <section class="panel panel--detail hidden" id="detail-panel">
          <div class="detail__header">
            <div>
              <p class="eyebrow">题目</p>
              <h2 id="detail-title">选择一个问题开始</h2>
            </div>
            <div class="detail__tags">
              <span class="tag" id="detail-status">未开始</span>
              <span class="tag hidden" id="detail-cache-tag">缓存命中</span>
            </div>
          </div>

          <div class="detail__meta" id="detail-meta"></div>
          <div class="warning-box hidden" id="preview-warning"></div>

          <section class="detail__section">
            <p class="detail__section-label" id="detail-main-label">标准答案</p>
            <div class="answer" id="detail-answer">
              选中左侧问题后，这里会显示压缩后的标准答案。
            </div>
            <div class="detail__actions hidden" id="preview-confirm-actions">
              <button id="confirm-document-button" class="toolbar__button toolbar__button--primary">
                确认该文档可导入
              </button>
            </div>
            <button class="link-button hidden" id="source-toggle" type="button">
              基于原文整理，可展开查看依据
            </button>
          </section>

          <section class="detail__section hidden" id="sources-panel">
            <p class="detail__section-label">原文依据</p>
            <div class="sources" id="detail-sources"></div>
          </section>

          <section class="detail__section hidden" id="error-panel">
            <p class="detail__section-label">失败原因</p>
            <div class="error-box" id="detail-error"></div>
            <div class="detail__actions">
              <button id="retry-document-button" class="toolbar__button">重新处理当前文档</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="./src/app.js"></script>
  </body>
</html>
